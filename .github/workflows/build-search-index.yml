name: Build and Deploy Site

on:
  push:
    branches:
      - main
    paths:
      - 'data/resources.json'
      - 'site/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install jsonschema

      - name: Generate static resource pages
        run: python scripts/generate_resource_pages.py

      - name: Generate stats
        run: python scripts/generate_stats.py

      - name: Build Pagefind search index
        run: npx -y pagefind --site site --output-path site/pagefind

      - name: Copy data to site directory
        run: cp -r data site/data

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
