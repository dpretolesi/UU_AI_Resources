name: Process Pending Resources

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  merge-resources:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install jsonschema

      - name: Process pending resources
        run: python scripts/process_pending.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/resources.json data/rejected.json data/state.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: process pending resources from PR #${{ github.event.pull_request.number }}"
          git push
