name: Handle Rejection

on:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  pull-requests: write

jobs:
  process-rejection:
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, 'REJECT:')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Get PR branch
        id: pr-info
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_DATA=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }})
          echo "branch=$(echo $PR_DATA | jq -r '.head.ref')" >> $GITHUB_OUTPUT

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.branch }}
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install jsonschema PyGithub

      - name: Process rejection
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_NUMBER: ${{ github.event.issue.number }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_BRANCH: ${{ steps.pr-info.outputs.branch }}
        run: python scripts/process_rejection.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rejected.json data/pending/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: process rejection from PR #${{ github.event.issue.number }}"
          git push
